name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm install --no-fund --no-audit
      - name: Test (sdk + extension, includes real-bash integration)
        run: npm test
      - name: Typecheck
        run: npm run typecheck
